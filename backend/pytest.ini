[pytest]
# pytest配置文件

# 测试发现
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出选项
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# 标记
markers =
    asyncio: 异步测试
    integration: 集成测试
    unit: 单元测试

# asyncio配置
asyncio_mode = auto

# 覆盖率配置（可选）
# addopts = --cov=app --cov-report=html --cov-report=term
