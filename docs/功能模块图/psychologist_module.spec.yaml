meta:
  profile: default
  theme: academic-color
  source: generated
  layout: horizontal
  routing: rounded
  title: 映记 - 心理老师功能模块图
  description: 面向心理老师角色的专业支持、重点风险识别与隐私边界视图。
modules:
  - id: identity
    label: 身份与权限
  - id: assessment
    label: 观察与评估
  - id: intervention
    label: 专业支持
  - id: ethics
    label: 伦理与安全
nodes:
  - id: psychologist
    label: 心理老师
    type: user
    size: large
    module: identity
    position:
      x: 70
      'y': 220
    style:
      fillColor: '#EEF2FF'
      strokeColor: '#8D79BB'
  - id: certify
    label: 心理老师认证\n资质/院系/负责范围
    type: document
    module: identity
    position:
      x: 280
      'y': 100
    style:
      fillColor: '#F9F5FF'
      strokeColor: '#A09AB8'
  - id: scope
    label: 负责范围绑定\n班级/院系维度
    type: service
    module: identity
    position:
      x: 280
      'y': 280
    style:
      fillColor: '#F7F3EF'
      strokeColor: '#C9B8AC'
  - id: risk
    label: 重点关注概览\n低落/焦虑/波动学生
    type: service
    module: assessment
    position:
      x: 540
      'y': 60
    style:
      fillColor: '#FFF1F2'
      strokeColor: '#FB7185'
  - id: pattern
    label: 长期趋势观察\n连续低谷/恢复轨迹
    type: service
    module: assessment
    position:
      x: 540
      'y': 220
    style:
      fillColor: '#EEF8F5'
      strokeColor: '#6ED8B8'
  - id: summary
    label: AI 辅助摘要\n脱敏心理状态概览
    type: service
    module: assessment
    position:
      x: 540
      'y': 380
    style:
      fillColor: '#FFF8E7'
      strokeColor: '#F3BE4D'
  - id: consult
    label: 专业咨询支持\n建立跟进计划
    type: service
    module: intervention
    position:
      x: 800
      'y': 110
    style:
      fillColor: '#ECFDF5'
      strokeColor: '#34D399'
  - id: crisis
    label: 危机识别与转介\n必要时线下介入
    type: service
    module: intervention
    position:
      x: 800
      'y': 290
    style:
      fillColor: '#FEF2F2'
      strokeColor: '#EF4444'
  - id: digest
    label: 周度分析邮件\n负责范围内趋势报告
    type: service
    module: intervention
    position:
      x: 800
      'y': 470
    style:
      fillColor: '#FFF7ED'
      strokeColor: '#E88F7B'
  - id: no_raw
    label: 隐私最小化\n默认不看原始日记正文
    type: database
    module: ethics
    position:
      x: 1080
      'y': 160
    style:
      fillColor: '#F8FAFC'
      strokeColor: '#94A3B8'
  - id: boundary
    label: 辅助而非诊断\nAI 结果仅作参考
    type: service
    module: ethics
    position:
      x: 1080
      'y': 350
    style:
      fillColor: '#FAFAF9'
      strokeColor: '#D6CCC2'
edges:
  - from: psychologist
    to: certify
    type: primary
  - from: certify
    to: scope
    type: primary
  - from: scope
    to: risk
    type: primary
  - from: risk
    to: pattern
    type: primary
  - from: pattern
    to: summary
    type: data
  - from: summary
    to: consult
    type: primary
  - from: risk
    to: crisis
    type: primary
    label: 高风险
  - from: pattern
    to: digest
    type: data
  - from: no_raw
    to: risk
    type: data
  - from: boundary
    to: consult
    type: optional
