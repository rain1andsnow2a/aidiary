meta:
  profile: default
  theme: academic-color
  source: generated
  layout: horizontal
  routing: rounded
  title: 映记 - 管理员功能模块图
  description: 面向管理员角色的系统治理、认证审核、用户管理与社区安全功能视图。
modules:
  - id: console
    label: 管理入口
  - id: account
    label: 用户与角色治理
  - id: content
    label: 内容与社区治理
  - id: operation
    label: 系统运营与安全
nodes:
  - id: admin
    label: 管理员
    type: user
    size: large
    module: console
    position:
      x: 70
      'y': 220
    style:
      fillColor: '#FEF2F2'
      strokeColor: '#EF4444'
  - id: login
    label: 管理后台入口\nAdminRoute 权限守卫
    type: service
    module: console
    position:
      x: 280
      'y': 120
    style:
      fillColor: '#F8FAFC'
      strokeColor: '#94A3B8'
  - id: overview
    label: 系统概览\n用户/日记/社区统计
    type: service
    module: console
    position:
      x: 280
      'y': 310
    style:
      fillColor: '#FFF8E7'
      strokeColor: '#F3BE4D'
  - id: users
    label: 用户管理\n搜索/筛选/启停账号
    type: service
    module: account
    position:
      x: 540
      'y': 50
    style:
      fillColor: '#EEF2FF'
      strokeColor: '#8D79BB'
  - id: roles
    label: 角色管理\nstudent/counselor/psychologist/admin
    type: service
    module: account
    position:
      x: 540
      'y': 210
    style:
      fillColor: '#F9F5FF'
      strokeColor: '#A09AB8'
  - id: applications
    label: 认证审核\n辅导员/心理老师申请
    type: document
    module: account
    position:
      x: 540
      'y': 370
    style:
      fillColor: '#ECFDF5'
      strokeColor: '#34D399'
  - id: bindings
    label: 负责范围维护\n院系/班级绑定
    type: service
    module: account
    position:
      x: 540
      'y': 530
    style:
      fillColor: '#F7F3EF'
      strokeColor: '#C9B8AC'
  - id: posts
    label: 社区帖子管理\n隐藏/删除/标记
    type: service
    module: content
    position:
      x: 820
      'y': 120
    style:
      fillColor: '#FFF1F2'
      strokeColor: '#FB7185'
  - id: identity
    label: 匿名真实身份查看\n仅管理员治理使用
    type: database
    module: content
    position:
      x: 820
      'y': 300
    style:
      fillColor: '#F8FAFC'
      strokeColor: '#94A3B8'
  - id: audit
    label: 审计与安全边界\n权限隔离/操作留痕
    type: service
    module: operation
    position:
      x: 1100
      'y': 110
    style:
      fillColor: '#FAFAF9'
      strokeColor: '#D6CCC2'
  - id: email
    label: 邮件与定时任务\n验证码/周报推送
    type: service
    module: operation
    position:
      x: 1100
      'y': 290
    style:
      fillColor: '#FFF7ED'
      strokeColor: '#E88F7B'
  - id: config
    label: 系统配置\n部署/反代/API 文档
    type: service
    module: operation
    position:
      x: 1100
      'y': 470
    style:
      fillColor: '#EEF8F5'
      strokeColor: '#6ED8B8'
edges:
  - from: admin
    to: login
    type: primary
  - from: login
    to: overview
    type: primary
  - from: overview
    to: users
    type: data
  - from: users
    to: roles
    type: primary
  - from: roles
    to: applications
    type: primary
  - from: applications
    to: bindings
    type: data
  - from: overview
    to: posts
    type: data
  - from: posts
    to: identity
    type: optional
    label: 治理需要
  - from: login
    to: audit
    type: data
  - from: applications
    to: email
    type: data
    label: 审核/通知
  - from: config
    to: audit
    type: optional
