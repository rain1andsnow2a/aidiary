meta:
  profile: default
  theme: academic-color
  source: generated
  layout: horizontal
  routing: rounded
  title: 映记 - 辅导员功能模块图
  description: 面向辅导员角色的认证、绑定范围、脱敏看板与周度关怀流程。
modules:
  - id: identity
    label: 身份与范围
  - id: dashboard
    label: 专用看板
  - id: care
    label: 关怀工作流
  - id: boundary
    label: 隐私边界
nodes:
  - id: counselor
    label: 辅导员
    type: user
    size: large
    module: identity
    position:
      x: 70
      'y': 210
    style:
      fillColor: '#F0FDFA'
      strokeColor: '#2DD4BF'
  - id: apply
    label: 角色认证申请\n工号/院系/负责范围
    type: document
    module: identity
    position:
      x: 280
      'y': 90
    style:
      fillColor: '#ECFDF5'
      strokeColor: '#34D399'
  - id: binding
    label: 绑定班级/院系\n只看负责范围内学生
    type: service
    module: identity
    position:
      x: 280
      'y': 260
    style:
      fillColor: '#F7F3EF'
      strokeColor: '#C9B8AC'
  - id: overview
    label: 辅导员工作台\n活跃人数/记录频次
    type: service
    module: dashboard
    position:
      x: 540
      'y': 40
    style:
      fillColor: '#EEF8F5'
      strokeColor: '#6ED8B8'
  - id: trend
    label: 情绪趋势\n群体分布/波动变化
    type: service
    module: dashboard
    position:
      x: 540
      'y': 180
    style:
      fillColor: '#EEF2FF'
      strokeColor: '#8D79BB'
  - id: watchlist
    label: 重点关注学生\n脱敏编号/风险等级
    type: service
    module: dashboard
    position:
      x: 540
      'y': 320
    style:
      fillColor: '#FFF1F2'
      strokeColor: '#FB7185'
  - id: weekly
    label: 每周摘要推送\n自动邮件报告
    type: service
    module: care
    position:
      x: 800
      'y': 80
    style:
      fillColor: '#FFF8E7'
      strokeColor: '#F3BE4D'
  - id: follow
    label: 日常关怀建议\n班级层面的支持策略
    type: service
    module: care
    position:
      x: 800
      'y': 250
    style:
      fillColor: '#FFF7ED'
      strokeColor: '#E88F7B'
  - id: transfer
    label: 必要时转介\n交由心理老师专业介入
    type: service
    module: care
    position:
      x: 800
      'y': 420
    style:
      fillColor: '#FDF2F8'
      strokeColor: '#F09AB6'
  - id: anonymized
    label: 脱敏聚合数据\n不展示原始日记正文
    type: database
    module: boundary
    position:
      x: 1080
      'y': 140
    style:
      fillColor: '#F8FAFC'
      strokeColor: '#94A3B8'
  - id: audit
    label: 权限校验\n仅 counselor/psychologist/admin
    type: service
    module: boundary
    position:
      x: 1080
      'y': 330
    style:
      fillColor: '#FAFAF9'
      strokeColor: '#D6CCC2'
edges:
  - from: counselor
    to: apply
    type: primary
  - from: apply
    to: binding
    type: primary
    label: 审核通过后生效
  - from: binding
    to: overview
    type: primary
  - from: overview
    to: trend
    type: primary
  - from: trend
    to: watchlist
    type: primary
  - from: watchlist
    to: follow
    type: primary
    label: 制定关怀
  - from: overview
    to: weekly
    type: data
    label: 定时汇总
  - from: follow
    to: transfer
    type: optional
    label: 高风险
  - from: anonymized
    to: overview
    type: data
  - from: audit
    to: binding
    type: data
